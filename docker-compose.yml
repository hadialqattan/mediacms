services:
  postgres:
    labels:
      - "com.mediacms.project=content-platform"
    image: postgres:18.1-alpine
    container_name: mediacms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mediacms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediacms-network

  redis:
    labels:
      - "com.mediacms.project=content-platform"
    image: redis:8.4.0-alpine
    container_name: mediacms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediacms-network

  typesense:
    labels:
      - "com.mediacms.project=content-platform"
    image: typesense/typesense:30.1
    container_name: mediacms-typesense
    environment:
      TYPESENSE_API_KEY: xyz
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: "--api-key=xyz --data-dir=/data --enable-cors"
    networks:
      - mediacms-network

  cms-api:
    labels:
      - "com.mediacms.project=content-platform"
    build:
      context: .
      dockerfile: cmd/cms-api/Dockerfile
    container_name: mediacms-cms-api
    environment:
      SERVICE_NAME: mediacms-cms-api
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mediacms?sslmode=disable
      REDIS_ADDR: redis:6379
      TYPESENSE_ADDRESS: http://typesense:8108
      TYPESENSE_API_KEY: xyz
      JWT_SECRET: your-secret-key-here
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mediacms-network

  discovery-api:
    labels:
      - "com.mediacms.project=content-platform"
    build:
      context: .
      dockerfile: cmd/discovery-api/Dockerfile
    container_name: mediacms-discovery-api
    environment:
      SERVICE_NAME: mediacms-discovery-api
      PORT: 8081
      TYPESENSE_ADDRESS: http://typesense:8108
      TYPESENSE_API_KEY: xyz
    ports:
      - "8081:8081"
    depends_on:
      typesense:
        condition: service_started
    networks:
      - mediacms-network

  outbox-relay:
    labels:
      - "com.mediacms.project=content-platform"
    build:
      context: .
      dockerfile: cmd/outbox-relay/Dockerfile
    container_name: mediacms-outbox-relay
    environment:
      SERVICE_NAME: mediacms-outbox-relay
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mediacms?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mediacms-network

  search-indexer:
    labels:
      - "com.mediacms.project=content-platform"
    build:
      context: .
      dockerfile: cmd/search-indexer/Dockerfile
    container_name: mediacms-search-indexer
    environment:
      SERVICE_NAME: mediacms-search-indexer
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mediacms?sslmode=disable
      REDIS_ADDR: redis:6379
      TYPESENSE_ADDRESS: http://typesense:8108
      TYPESENSE_API_KEY: xyz
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_started
    networks:
      - mediacms-network

volumes:
  postgres_data:
    labels:
      - "com.mediacms.project=content-platform"
  typesense_data:
    labels:
      - "com.mediacms.project=content-platform"

networks:
  mediacms-network:
    driver: bridge
